  <!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>即將前往 LINE</title>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="即將前往 LINE" />
  <meta property="og:description" content="點擊下方按鈕開啟 LINE 加入好友" />

  <style>
    :root {
      --line-green: #06c755;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--line-green);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      color: var(--white);
      overflow: hidden;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 34px;
      background: var(--line-green);
    }

    .content {
      width: 100%;
      max-width: 348px;
      text-align: center;
      margin: 0 auto;
      transform: translateY(2px);
    }

    .bubble {
      display: block;
      font-size: 72px;
      line-height: 1;
      margin: 0 auto 35px;
      user-select: none;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.14));
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 20px 0 37px;
      font-size: 18px;
      line-height: 1.42;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.92);
      white-space: nowrap;
    }

    .line-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 62px;
      border: 0;
      border-radius: 13px;
      background: var(--white);
      color: var(--line-green);
      text-decoration: none;
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    .line-btn:active {
      transform: scale(0.985);
    }

    @media (min-width: 768px) {
      .content {
        max-width: 348px;
      }
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 28px;
        padding-right: 28px;
      }

      .content {
        max-width: 304px;
      }

      .bubble {
        font-size: 66px;
        margin-bottom: 30px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 16px;
        margin: 18px 0 32px;
      }

      .line-btn {
        height: 58px;
        font-size: 22px;
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content" aria-label="LINE 導流頁">
      <span class="bubble" aria-hidden="true">💬</span>
      <h1 class="title">即將前往 LINE</h1>
      <p class="subtitle">點擊下方按鈕開啟 LINE 加入好友</p>
      <a class="line-btn" href="https://lin.ee/VmBTMW6" rel="noopener noreferrer">開啟 LINE</a>
    </section>
  </main>
</body>
</html>
    
  </body>
  
</html>
