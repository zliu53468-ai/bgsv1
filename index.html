<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  fbq('init', '2820274571669331');
  fbq('track', 'PageView');

  <noscript>
    <img
      height="1"
      width="1"
      style="display:none"
      src="https://www.facebook.com/tr?id=2820274571669331&ev=PageView&noscript=1"
      alt=""

  <title>即將前往 LINE</title>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="即將前往 LINE" />
  <meta property="og:description" content="點擊下方按鈕開啟 LINE 加入好友" />

  <style>
    :root {
      --line-green: #06c755;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--line-green);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100svh;
      color: var(--white);
      overflow: hidden;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 34px;
      background: var(--line-green);
    }

    .content {
      width: 100%;
      max-width: 348px;
      text-align: center;
      margin: 0 auto;
      transform: translateY(2px);
    }

    .bubble {
      display: block;
      font-size: 72px;
      line-height: 1;
      margin: 0 auto 35px;
      user-select: none;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.14));
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 20px 0 37px;
      font-size: 18px;
      line-height: 1.42;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.92);
      white-space: nowrap;
    }

    .line-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 62px;
      border: 0;
      border-radius: 13px;
      background: var(--white);
      color: var(--line-green);
      text-decoration: none;
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    .line-btn:active {
      transform: scale(0.985);
    }

    .line-btn.is-loading {
      pointer-events: none;
      opacity: 0.96;
    }

    .btn-loading-content {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .line-btn.is-loading .btn-default-content {
      display: none;
    }

    .line-btn.is-loading .btn-loading-content {
      display: flex;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(6, 199, 85, 0.25);
      border-top-color: var(--line-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (min-width: 768px) {
      .content {
        max-width: 348px;
      }
    }

    @media (max-width: 360px) {
      .page {
        padding-left: 28px;
        padding-right: 28px;
      }

      .content {
        max-width: 304px;
      }

      .bubble {
        font-size: 66px;
        margin-bottom: 30px;
      }

      .title {
        font-size: 26px;
      }

      .subtitle {
        font-size: 16px;
        margin: 18px 0 32px;
      }

      .line-btn {
        height: 58px;
        font-size: 22px;
        border-radius: 12px;
      }

      .loading-spinner {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content" aria-label="LINE 導流頁">
      <span class="bubble" aria-hidden="true">💬</span>
      <h1 class="title">即將前往 LINE</h1>
      <p class="subtitle">點擊下方按鈕開啟 LINE 加入好友</p>

      <a
        id="lineButton"
        class="line-btn"
        href="https://lin.ee/VmBTMW6"
        rel="noopener noreferrer"
        aria-label="開啟 LINE"
      >
        <span class="btn-default-content">開啟 LINE</span>

        <span class="btn-loading-content" aria-hidden="true">
          <span class="loading-spinner"></span>
          <span>載入中...</span>
        </span>
      </a>
    </section>
  </main>

  <script>
    const lineButton = document.getElementById("lineButton");
    const lineUrl = lineButton.href;
    let isRedirecting = false;

    lineButton.addEventListener("click", function (event) {
      event.preventDefault();

      if (isRedirecting) {
        return;
      }

      isRedirecting = true;

      if (typeof fbq === "function") {
        fbq("track", "Contact", {
          content_name: "LINE 加入好友按鈕",
          destination: "LINE"
        });
      }

      lineButton.classList.add("is-loading");
      lineButton.setAttribute("aria-busy", "true");
      lineButton.setAttribute("aria-label", "正在前往 LINE");

      window.setTimeout(function () {
        window.location.href = lineUrl;
      }, 1200);
    });
  </script>
</body>
</html>
